version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      radix:
        patterns:
          - "@radix-ui/*"
      dev-tooling:
        dependency-type: "development"
    # Security PRs ignore this and open immediately regardless of schedule
