version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    groups:
      # react and react-dom MUST bump together — mismatched versions throw
      # React error #527 at boot and blank the whole site (2026-07-19 outage).
      # Listed first so @types/react* land here, not in dev-tooling.
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      radix:
        patterns:
          - "@radix-ui/*"
      dev-tooling:
        dependency-type: "development"
    ignore:
      # TypeScript 7 is the native (tsgo) compiler and breaks Vercel's build;
      # pnpm 11 stops reading the package.json "pnpm" field (overrides/patches).
      # Revisit both deliberately, not via auto-bumps.
      - dependency-name: "typescript"
        update-types: ["version-update:semver-major"]
      - dependency-name: "pnpm"
        update-types: ["version-update:semver-major"]
    # Security PRs ignore this and open immediately regardless of schedule
